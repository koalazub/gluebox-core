name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [nextest, clippy, fmt]
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3.16.3

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: nix build --print-build-logs .#checks.x86_64-linux.${{ matrix.check }}

  build:
    name: build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3.16.3

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: nix build --print-build-logs .#packages.x86_64-linux.gluebox-core
